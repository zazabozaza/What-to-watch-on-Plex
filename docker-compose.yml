version: '3.8'

services:
  wtwp:
    image: netplexflix/wtwp:latest
    container_name: wtwp
    restart: unless-stopped
    ports:
      - "3000:3000" #change port by using "xxxx:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_PATH=/app/data
      - TZ=Europe/Amsterdam  # Change to your timezone
      - PUID=1000  # Set to your user's UID (run: id -u)
      - PGID=1000  # Set to your user's GID (run: id -g)
      # - UMASK=002  # Optional: file permission mask
      # - CORS_ORIGINS=http://192.168.1.100:3000,https://wtw.yourdomain.com  # Required if accessing via LAN IP, hostname, or reverse proxy (not needed for localhost). Comma-separated list.